<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Alejandra y Madrina</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Escena pixel-art -->
  <div class="scene" id="scene">

    <!-- Fondo (imagen pixel-art) -->
    <div class="background"></div>

    <!-- Personaje: 4 frames de caminata + 4 de ataque. -->
    <div id="madrina" class="character">
      <img class="frame walk-frame" data-frame="0" src="madrina/madrinad1.png" alt="Madrina walk 1" />
      <img class="frame walk-frame" data-frame="1" src="madrina/madrinad2.png" alt="Madrina walk 2" />
      <img class="frame walk-frame" data-frame="2" src="madrina/madrinad3.png" alt="Madrina walk 3" />
      <img class="frame walk-frame" data-frame="3" src="madrina/madrinad4.png" alt="Madrina walk 4" />
      <img class="frame attack-frame" data-frame="0" src="madrina/madrinaa1.png" alt="Madrina attack 1" />
      <img class="frame attack-frame" data-frame="1" src="madrina/madrinaa2.png" alt="Madrina attack 2" />
      <img class="frame attack-frame" data-frame="2" src="madrina/madrinaa3.png" alt="Madrina attack 3" />
      <img class="frame attack-frame" data-frame="3" src="madrina/madrinaa4.png" alt="Madrina attack 4" />
      <img class="frame crouch-frame" data-frame="0" src="madrina/madrinaseagacha1.png" alt="Madrina crouch 1" />
      <img class="frame crouch-frame" data-frame="1" src="madrina/madrinaseagacha2.png" alt="Madrina crouch 2" />
    </div>

    <!-- Contenedor donde el JS inyecta proyectiles -->
    <div id="projectiles"></div>

    <!-- Audio de pasos en loop -->
    <audio id="footsteps" src="sounds/walking-madrina.mp3" loop preload="auto"></audio>

    <!-- Sonido de disparo (one-shot) -->
    <audio id="firesound" src="sounds/fire-madrina.mp3" preload="auto"></audio>

    <!-- Sonido de confirmación del botón PLAY -->
    <audio id="confirmsound" src="sounds/confirmbutton.mp3" preload="auto"></audio>

    <!-- Música de fondo en loop -->
    <audio id="bgmusic" src="Where_the_Lanterns_Sleep.mp3" loop preload="auto"></audio>

    <!-- HUD de vidas (arriba a la derecha) -->
    <div class="hud-lives" id="hud-lives"></div>

    <!-- Controles táctiles (visibles solo en móvil/tablet) -->
    <div class="touch-controls" id="touch-controls">
      <div class="tc-group tc-left-group">
        <button class="tc-btn" id="tc-left" aria-label="Izquierda">◀</button>
        <button class="tc-btn" id="tc-right" aria-label="Derecha">▶</button>
      </div>
      <button class="tc-btn tc-center" id="tc-down" aria-label="Agacharse">▼</button>
      <button class="tc-btn tc-attack" id="tc-attack" aria-label="Atacar">✦</button>
    </div>

    <!-- Pequeña pista en pantalla -->
    <div class="hint">Usa ⬅ ➡ para moverte</div>

    <!-- Pantalla inicial (title screen) -->
    <div class="title-screen" id="title-screen">
      <img class="title-logo" src="elements/elHadaMadrina.png" alt="El Hada Madrina" />
      <img class="title-play" id="title-play" src="elements/buttonplay.png" alt="Play"
           tabindex="0" role="button" aria-label="Play" />
    </div>

    <!-- Aviso de orientación (solo móvil vertical) -->
    <div class="rotate-overlay" id="rotate-overlay">
      <div class="rotate-icon">📱</div>
      <div class="rotate-text">Gira el móvil para jugar</div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
